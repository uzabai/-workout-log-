<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff4500">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Workout Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:#0a0a0a; color:#e8e8e8; font-family:'JetBrains Mono',monospace; min-height:100vh; }
    .app { max-width:480px; margin:0 auto; padding:16px; padding-bottom:40px; min-height:100vh; background:#0a0a0a; }
    .nav { display:flex; margin-bottom:20px; border-bottom:2px solid #1e1e1e; }
    .nav-btn { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px; padding:10px 18px; background:transparent; border:none; color:#444; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
    .nav-btn.active { color:#ff4500; border-bottom-color:#ff4500; }
    .header { border-bottom:2px solid #ff4500; padding-bottom:10px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:flex-end; }
    .header h1 { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:4px; color:#ff4500; line-height:1; }
    .header .date { font-size:10px; color:#666; letter-spacing:1px; }
    .session-meta { display:flex; gap:8px; margin-bottom:16px; }
    .meta-box { flex:1; background:#141414; border:1px solid #222; padding:8px; text-align:center; }
    .meta-box .label { font-size:9px; color:#555; letter-spacing:2px; margin-bottom:2px; }
    .meta-box .value { font-size:18px; font-family:'Bebas Neue',sans-serif; color:#ff4500; letter-spacing:2px; }
    .rest-timer { background:#141414; border:1px solid #222; padding:12px; margin-bottom:14px; }
    .rest-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .rest-label { font-size:10px; letter-spacing:3px; color:#555; }
    .rest-display { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:4px; color:#e8e8e8; transition:color 0.3s; }
    .rest-display.urgent { color:#ff4500; }
    .rest-bar-bg { height:3px; background:#222; border-radius:2px; overflow:hidden; margin-bottom:8px; }
    .rest-bar-fill { height:100%; background:#ff4500; transition:width 0.5s linear; border-radius:2px; }
    .rest-presets { display:flex; gap:5px; flex-wrap:wrap; }
    .rest-preset { font-family:'Bebas Neue',sans-serif; font-size:13px; padding:4px 10px; background:#0a0a0a; border:1px solid #2a2a2a; color:#555; cursor:pointer; transition:all 0.15s; }
    .rest-preset.active { background:#ff4500; color:#000; border-color:#ff4500; }
    .rest-stop { font-family:'JetBrains Mono',monospace; font-size:10px; padding:4px 8px; background:transparent; border:1px solid #333; color:#666; cursor:pointer; }
    .section-title { font-size:10px; letter-spacing:3px; color:#555; margin-bottom:8px; }
    .muscle-tabs { display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; }
    .muscle-tab { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:2px; padding:4px 10px; border:1px solid #2a2a2a; background:#141414; color:#555; cursor:pointer; transition:all 0.15s; }
    .muscle-tab.active { color:#000; border-color:transparent; }
    .tab-dot { display:inline-block; width:5px; height:5px; border-radius:50%; margin-right:4px; vertical-align:middle; }
    .add-exercise { background:#141414; border:1px solid #222; padding:12px; margin-bottom:14px; }
    .group-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .group-bar-left { display:flex; align-items:center; gap:6px; }
    .group-dot { width:8px; height:8px; border-radius:50%; }
    .group-label { font-size:10px; letter-spacing:2px; color:#888; }
    .btn-edit { font-family:'JetBrains Mono',monospace; font-size:10px; padding:3px 8px; background:transparent; border:1px solid #333; color:#555; cursor:pointer; }
    .ex-select { width:100%; background:#0a0a0a; border:1px solid #333; color:#e8e8e8; font-family:'JetBrains Mono',monospace; font-size:12px; padding:8px; outline:none; appearance:none; -webkit-appearance:none; margin-bottom:8px; }
    .btn-add { background:#ff4500; color:#000; border:none; width:100%; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; padding:9px; cursor:pointer; transition:background 0.15s; }
    .btn-add:disabled { background:#2a2a2a; color:#444; }
    .ex-card { background:#141414; border:1px solid #222; margin-bottom:8px; }
    .ex-header { padding:6px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e1e1e; }
    .ex-header-left { display:flex; align-items:center; gap:6px; }
    .ex-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .ex-name { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px; color:#e8e8e8; }
    .ex-badge { font-size:9px; letter-spacing:1px; padding:1px 5px; border-radius:2px; font-family:'JetBrains Mono',monospace; opacity:0.8; }
    .btn-x { background:transparent; color:#444; border:none; font-size:14px; cursor:pointer; padding:4px 8px; }
    .sets-table { width:100%; border-collapse:collapse; }
    .sets-table thead tr { background:#0f0f0f; }
    .sets-table th { font-size:9px; color:#444; letter-spacing:2px; padding:4px 10px; text-align:center; font-weight:normal; }
    .sets-table td { padding:6px 10px; text-align:center; font-size:12px; border-bottom:1px solid #1a1a1a; }
    .sets-table tr:last-child td { border-bottom:none; }
    .set-num { color:#444; font-size:11px; }
    .w-val { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:1px; }
    .set-form { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:8px 12px; background:#0f0f0f; border-top:1px solid #1e1e1e; }
    .field-label { font-size:9px; color:#555; letter-spacing:2px; margin-bottom:3px; text-align:center; }
    .field-input { width:100%; background:#141414; border:1px solid #2a2a2a; color:#e8e8e8; font-family:'JetBrains Mono',monospace; font-size:16px; padding:8px 6px; text-align:center; outline:none; -webkit-appearance:none; }
    .field-input:focus { border-color:#ff4500; }
    .record-btn { display:block; width:calc(100% - 24px); margin:6px 12px 8px; border:none; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; padding:8px; cursor:pointer; }
    .empty-state { text-align:center; padding:28px 20px; color:#2a2a2a; }
    .empty-state .icon { font-size:36px; margin-bottom:8px; }
    .empty-state p { font-size:11px; letter-spacing:2px; }
    .note-input { width:100%; background:#141414; border:1px solid #222; border-top:none; color:#888; font-family:'JetBrains Mono',monospace; font-size:11px; padding:8px 12px; outline:none; resize:none; }
    .footer { margin-top:16px; display:flex; gap:10px; }
    .btn-finish { flex:1; background:#ff4500; color:#000; border:none; font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; padding:14px; cursor:pointer; }
    .btn-finish:disabled { background:#2a2a2a; color:#444; }
    .btn-reset { background:transparent; color:#333; border:1px solid #222; font-family:'JetBrains Mono',monospace; font-size:11px; padding:14px; cursor:pointer; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:flex; align-items:center; justify-content:center; z-index:100; }
    .summary-card { background:#0f0f0f; border:2px solid #ff4500; padding:24px; width:90%; max-width:400px; max-height:85vh; overflow-y:auto; }
    .summary-card h2 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:4px; color:#ff4500; margin-bottom:14px; }
    .s-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1e1e1e; font-size:12px; }
    .s-key { color:#555; } .s-val { color:#e8e8e8; }
    .s-group-title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:3px; margin-top:14px; margin-bottom:5px; display:flex; align-items:center; gap:8px; }
    .s-group-line { flex:1; height:1px; background:#1e1e1e; }
    .s-ex { padding:6px 0; border-bottom:1px solid #1a1a1a; }
    .s-ex-name { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; color:#e8e8e8; }
    .s-ex-sets { font-size:11px; color:#555; margin-top:1px; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:flex; align-items:flex-end; justify-content:center; z-index:200; }
    .modal-card { background:#111; border-top:2px solid #ff4500; padding:20px; width:100%; max-width:480px; max-height:75vh; overflow-y:auto; }
    .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .modal-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; }
    .modal-close { background:transparent; border:none; color:#555; font-size:22px; cursor:pointer; padding:4px 10px; }
    .ex-item { display:flex; align-items:center; gap:8px; padding:10px 0; border-bottom:1px solid #1a1a1a; }
    .ex-item-name { flex:1; font-size:13px; color:#ccc; }
    .btn-icon { background:transparent; border:none; cursor:pointer; font-size:16px; padding:6px 8px; color:#444; }
    .add-row { display:flex; gap:8px; margin-top:12px; }
    .add-row input { flex:1; background:#0a0a0a; border:1px solid #333; color:#e8e8e8; font-family:'JetBrains Mono',monospace; font-size:14px; padding:10px; outline:none; }
    .add-row button { font-family:'Bebas Neue',sans-serif; font-size:15px; padding:10px 16px; background:#ff4500; color:#000; border:none; cursor:pointer; }
    .hist-empty { text-align:center; padding:48px 20px; color:#2a2a2a; }
    .hist-empty .icon { font-size:36px; margin-bottom:8px; }
    .hist-empty p { font-size:11px; letter-spacing:2px; }
    .hist-card { background:#141414; border:1px solid #222; margin-bottom:10px; overflow:hidden; }
    .hist-header { padding:12px 14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .hist-date { font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:2px; color:#e8e8e8; }
    .hist-meta { font-size:10px; color:#555; margin-top:2px; }
    .hist-chevron { color:#444; font-size:11px; transition:transform 0.2s; display:inline-block; }
    .hist-chevron.open { transform:rotate(180deg); }
    .hist-body { border-top:1px solid #1e1e1e; padding:10px 14px; }
    .hist-group { margin-bottom:10px; }
    .hist-group-label { font-size:9px; letter-spacing:3px; margin-bottom:5px; }
    .hist-ex { margin-bottom:5px; }
    .hist-ex-name { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:1px; color:#e8e8e8; }
    .hist-ex-sets { font-size:11px; color:#555; }
    .hist-note { margin-top:8px; padding-top:8px; border-top:1px solid #1a1a1a; font-size:11px; color:#555; }
    .hist-del { font-size:11px; color:#333; background:transparent; border:none; cursor:pointer; font-family:'JetBrains Mono',monospace; padding:4px 10px; }
    .edit-input { width:100%; background:#0a0a0a; border:1px solid #333; color:#e8e8e8; font-family:'JetBrains Mono',monospace; font-size:14px; padding:5px 8px; text-align:center; outline:none; }
    @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .rest-display.done { animation:flash 0.5s ease 3; color:#ff4500; }
    .hidden { display:none; }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const DEFAULT_EXERCISES = {
  chest:     ["ベンチプレス","インクラインベンチ","デクラインベンチ","チェストフライ","ケーブルクロスオーバー","ディップス"],
  arms:      ["バーベルカール","ダンベルカール","ハンマーカール","トライセプスプレス","スカルクラッシャー","ケーブルプッシュダウン"],
  shoulders: ["ショルダープレス","サイドレイズ","フロントレイズ","リアレイズ","アーノルドプレス","アップライトロウ"],
  back:      ["デッドリフト","ラットプルダウン","バーベルロウ","ワンハンドロウ","シーテッドロウ","チンニング"],
  legs:      ["スクワット","レッグプレス","ランジ","レッグカール","レッグエクステンション","カーフレイズ"],
};
const MUSCLE_GROUPS = [
  { id:"chest",     label:"胸",   color:"#ff4500" },
  { id:"arms",      label:"腕",   color:"#ff8c00" },
  { id:"shoulders", label:"肩",   color:"#ffd700" },
  { id:"back",      label:"背中", color:"#00bcd4" },
  { id:"legs",      label:"足",   color:"#7c3aed" },
];
const REST_PRESETS = [60,90,120,180,240,300];

function ld(k,fb){ try{ return JSON.parse(localStorage.getItem(k)||"null")||fb; }catch(e){ return fb; } }
function sv(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function ft(s){ return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function loadEx(){ const s=ld("custom_exercises",{}); const r={}; for(const g of MUSCLE_GROUPS) r[g.id]=s[g.id]||[...DEFAULT_EXERCISES[g.id]]; return r; }

// ---- State ----
let state = {
  tab: "workout",
  startTime: Date.now(),
  elapsed: 0,
  exercises: [],
  activeGroupId: "chest",
  selectedExercise: "",
  note: "",
  showSummary: false,
  restTarget: 90,
  restRemaining: null,
  history: ld("workout_history", []),
  openHistoryId: null,
  customExercises: loadEx(),
  showEditModal: false,
  editingIdx: null,
  editingVal: "",
  newExName: "",
  inputs: {},
  editingSet: null,
};

let elapsedTimer = null;
let restTimer = null;

function setState(patch){ Object.assign(state, patch); render(); }

// ---- Timers ----
elapsedTimer = setInterval(() => {
  state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  document.querySelector(".elapsed-val") && (document.querySelector(".elapsed-val").textContent = ft(state.elapsed));
  updateRestBar();
}, 1000);

function startRest(s){
  clearInterval(restTimer);
  state.restTarget = s;
  state.restRemaining = s;
  restTimer = setInterval(() => {
    if(state.restRemaining <= 1){ clearInterval(restTimer); state.restRemaining = 0; updateRestBar(); return; }
    state.restRemaining--;
    updateRestBar();
  }, 1000);
  updateRestBar();
}
function stopRest(){ clearInterval(restTimer); state.restRemaining = null; updateRestBar(); }
function updateRestBar(){
  const d = document.querySelector(".rest-display");
  const fill = document.querySelector(".rest-bar-fill");
  const stop = document.querySelector(".rest-stop-btn");
  if(!d) return;
  const rem = state.restRemaining;
  const tgt = state.restTarget;
  d.textContent = rem !== null ? ft(rem) : ft(tgt);
  d.className = "rest-display" + (rem!==null&&rem<=10&&rem>0?" urgent":"") + (rem===0?" done":"");
  if(fill) fill.style.width = (rem!==null&&tgt>0 ? (rem/tgt*100) : 100)+"%";
  if(stop){ if(rem!==null){ stop.classList.remove("hidden"); }else{ stop.classList.add("hidden"); } }
  document.querySelectorAll(".rest-preset").forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.dataset.s)===tgt);
  });
}

// ---- Render ----
function render(){
  const s = state;
  const today = new Date();
  const dateStr = today.toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  const totalSets = s.exercises.reduce((a,e)=>a+(e.sets?.length||0),0);
  const totalVolume = s.exercises.reduce((a,e)=>a+(e.sets||[]).reduce((b,st)=>b+st.weight*st.reps,0),0);
  const activeGroup = MUSCLE_GROUPS.find(g=>g.id===s.activeGroupId)||MUSCLE_GROUPS[0];
  const activeExList = s.customExercises[s.activeGroupId]||[];

  document.getElementById("app").innerHTML = `
    <div class="nav">
      <button class="nav-btn${s.tab==="workout"?" active":""}" onclick="setState({tab:'workout'})">トレーニング</button>
      <button class="nav-btn${s.tab==="history"?" active":""}" onclick="setState({tab:'history'})">履歴${s.history.length>0?" ("+s.history.length+")":""}</button>
    </div>

    ${s.tab==="workout" ? `
      <div class="header">
        <h1>WORKOUT LOG</h1>
        <div class="date">${dateStr}</div>
      </div>
      <div class="session-meta">
        <div class="meta-box"><div class="label">経過時間</div><div class="value elapsed-val">${ft(s.elapsed)}</div></div>
        <div class="meta-box"><div class="label">SETS</div><div class="value">${totalSets}</div></div>
        <div class="meta-box"><div class="label">VOLUME</div><div class="value">${totalVolume>=1000?(totalVolume/1000).toFixed(1)+"t":totalVolume+"kg"}</div></div>
      </div>
      <div class="rest-timer">
        <div class="rest-top">
          <span class="rest-label">▸ 休憩タイマー</span>
          <button class="rest-stop-btn rest-stop${s.restRemaining===null?" hidden":""}" onclick="stopRest()">リセット</button>
        </div>
        <div class="rest-display${s.restRemaining!==null&&s.restRemaining<=10&&s.restRemaining>0?" urgent":""}${s.restRemaining===0?" done":""}">${s.restRemaining!==null?ft(s.restRemaining):ft(s.restTarget)}</div>
        <div class="rest-bar-bg"><div class="rest-bar-fill" style="width:${s.restRemaining!==null&&s.restTarget>0?s.restRemaining/s.restTarget*100:100}%"></div></div>
        <div class="rest-presets">${REST_PRESETS.map(p=>`<button class="rest-preset${s.restTarget===p?" active":""}" data-s="${p}" onclick="startRest(${p})">${p}s</button>`).join("")}</div>
      </div>

      <div class="section-title">▸ 部位を選択</div>
      <div class="muscle-tabs">
        ${MUSCLE_GROUPS.map(g=>`<button class="muscle-tab${s.activeGroupId===g.id?" active":""}" style="${s.activeGroupId===g.id?"background-color:"+g.color+";color:#000;border-color:transparent":""}" onclick="changeGroup('${g.id}')"><span class="tab-dot" style="background-color:${s.activeGroupId===g.id?"#000":g.color}"></span>${g.label}</button>`).join("")}
      </div>

      <div class="add-exercise">
        <div class="group-bar">
          <div class="group-bar-left">
            <div class="group-dot" style="background-color:${activeGroup.color}"></div>
            <span class="group-label">${activeGroup.label}</span>
          </div>
          <button class="btn-edit" onclick="openEditModal()">種目を編集</button>
        </div>
        <select class="ex-select" id="exSelect" onchange="state.selectedExercise=this.value">
          ${activeExList.map(ex=>`<option${ex===s.selectedExercise?" selected":""}>${ex}</option>`).join("")}
          ${activeExList.length===0?`<option value="">種目を追加してください</option>`:""}
        </select>
        <button class="btn-add" ${!s.selectedExercise?"disabled":""} onclick="addExercise()">+ 追加</button>
      </div>

      <div class="section-title">▸ セッション</div>
      ${s.exercises.length===0
        ? `<div class="empty-state"><div class="icon">🏋️</div><p>エクササイズを追加してください</p></div>`
        : s.exercises.map(ex => {
          const grp = MUSCLE_GROUPS.find(g=>g.id===ex.groupId)||MUSCLE_GROUPS[0];
          const inp = s.inputs[ex.id]||{weight:"",reps:""};
          return `
            <div class="ex-card">
              <div class="ex-header">
                <div class="ex-header-left">
                  <div class="ex-dot" style="background-color:${grp.color}"></div>
                  <span class="ex-name">${ex.name}</span>
                  <span class="ex-badge" style="background-color:${grp.color}22;color:${grp.color}">${grp.label}</span>
                </div>
                <button class="btn-x" onclick="removeExercise(${ex.id})">✕</button>
              </div>
              ${ex.sets.length>0?`
                <table class="sets-table">
                  <thead><tr><th>SET</th><th>WEIGHT</th><th>REPS</th><th></th></tr></thead>
                  <tbody>
                    ${ex.sets.map((st,i)=>{
                      const isEdit = s.editingSet && s.editingSet.exId===ex.id && s.editingSet.idx===i;
                      if(isEdit) return `
                        <tr style="background:#1a1a1a">
                          <td class="set-num">#${i+1}</td>
                          <td><input class="edit-input" type="number" value="${s.editingSet.weight}" oninput="state.editingSet.weight=this.value" onkeydown="if(event.key==='Enter')saveEditSet(${ex.id},${i})"></td>
                          <td><input class="edit-input" type="number" value="${s.editingSet.reps}" oninput="state.editingSet.reps=this.value" onkeydown="if(event.key==='Enter')saveEditSet(${ex.id},${i})"></td>
                          <td>
                            <button class="btn-icon" style="color:#ff4500" onclick="saveEditSet(${ex.id},${i})">✓</button>
                            <button class="btn-icon" onclick="setState({editingSet:null})">✕</button>
                          </td>
                        </tr>`;
                      return `
                        <tr style="cursor:pointer" onclick="startEditSet(${ex.id},${i},'${st.weight}','${st.reps}')">
                          <td class="set-num">#${i+1}</td>
                          <td><span class="w-val" style="color:${grp.color}">${Number.isInteger(st.weight)?st.weight:st.weight.toFixed(1)}</span><span style="font-size:10px;color:#444">kg</span></td>
                          <td style="color:#e8e8e8">${st.reps}<span style="font-size:10px;color:#444">rep</span></td>
                          <td><button class="btn-x" onclick="event.stopPropagation();removeSet(${ex.id},${i})">✕</button></td>
                        </tr>`;
                    }).join("")}
                  </tbody>
                </table>`:""
              }
              <div class="set-form">
                <div>
                  <div class="field-label">KG</div>
                  <input class="field-input" type="number" inputmode="decimal" placeholder="60" value="${inp.weight}"
                    oninput="setInput(${ex.id},'weight',this.value)"
                    onkeydown="if(event.key==='Enter')recordSet(${ex.id})">
                </div>
                <div>
                  <div class="field-label">REPS</div>
                  <input class="field-input" type="number" inputmode="numeric" placeholder="10" value="${inp.reps}"
                    oninput="setInput(${ex.id},'reps',this.value)"
                    onkeydown="if(event.key==='Enter')recordSet(${ex.id})">
                </div>
              </div>
              <button class="record-btn" style="background-color:${grp.color};color:#000" onclick="recordSet(${ex.id})">+ SET 記録</button>
            </div>`;
        }).join("")
      }

      <textarea class="note-input" rows="2" placeholder="メモ（体調、感想など）" oninput="state.note=this.value">${s.note}</textarea>
      <div class="footer">
        <button class="btn-finish" ${s.exercises.length===0?"disabled":""} onclick="finishSession()">FINISH SESSION</button>
        <button class="btn-reset" onclick="resetWorkout()">RESET</button>
      </div>
    ` : `
      <div class="header"><h1>HISTORY</h1></div>
      ${s.history.length===0
        ? `<div class="hist-empty"><div class="icon">📋</div><p>まだ記録がありません</p></div>`
        : s.history.map(session => {
          const isOpen = s.openHistoryId===session.id;
          const sGroups = MUSCLE_GROUPS.map(g=>({...g,items:(session.exercises||[]).filter(e=>e.groupId===g.id)})).filter(g=>g.items.length>0);
          return `
            <div class="hist-card">
              <div class="hist-header" onclick="toggleHistory(${session.id})">
                <div>
                  <div class="hist-date">${session.date}</div>
                  <div class="hist-meta">${ft(session.duration)} ／ ${session.totalSets}セット ／ ${session.totalVolume}kg</div>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                  <button class="hist-del" onclick="event.stopPropagation();deleteHistory(${session.id})">削除</button>
                  <span class="hist-chevron${isOpen?" open":""}">▼</span>
                </div>
              </div>
              ${isOpen?`
                <div class="hist-body">
                  ${sGroups.map(grp=>`
                    <div class="hist-group">
                      <div class="hist-group-label" style="color:${grp.color}">${grp.label}</div>
                      ${grp.items.map(ex=>{
                        const maxW=ex.sets?.length>0?Math.max(...ex.sets.map(s=>s.weight)):0;
                        const totR=ex.sets?.reduce((a,s)=>a+s.reps,0)||0;
                        return `<div class="hist-ex"><div class="hist-ex-name">${ex.name}</div><div class="hist-ex-sets">${ex.sets?.length||0}セット ／ 最大${maxW}kg ／ 計${totR}rep</div></div>`;
                      }).join("")}
                    </div>`).join("")}
                  ${session.note?`<div class="hist-note">📝 ${session.note}</div>`:""}
                </div>`:""
              }
            </div>`;
        }).join("")
      }
    `}

    ${s.showSummary?`
      <div class="overlay" onclick="setState({showSummary:false})">
        <div class="summary-card" onclick="event.stopPropagation()">
          <h2>SESSION COMPLETE</h2>
          <div class="s-row"><span class="s-key">DATE</span><span class="s-val">${today.toLocaleDateString("ja-JP")}</span></div>
          <div class="s-row"><span class="s-key">DURATION</span><span class="s-val">${ft(s.elapsed)}</span></div>
          <div class="s-row"><span class="s-key">TOTAL SETS</span><span class="s-val">${totalSets}</span></div>
          <div class="s-row"><span class="s-key">TOTAL VOLUME</span><span class="s-val">${totalVolume}kg</span></div>
          ${MUSCLE_GROUPS.map(g=>{const items=s.exercises.filter(e=>e.groupId===g.id);if(!items.length)return"";return`<div class="s-group-title" style="color:${g.color}">${g.label}<div class="s-group-line"></div></div>${items.map(ex=>{const mW=ex.sets?.length>0?Math.max(...ex.sets.map(st=>st.weight)):0;const tR=ex.sets?.reduce((a,st)=>a+st.reps,0)||0;return`<div class="s-ex"><div class="s-ex-name">${ex.name}</div><div class="s-ex-sets">${ex.sets?.length||0}セット ／ 最大${mW}kg ／ 計${tR}rep</div></div>`;}).join("")}`;}).join("")}
          ${s.note?`<div style="margin-top:14px;font-size:11px;color:#555;border-top:1px solid #1e1e1e;padding-top:10px">${s.note}</div>`:""}
          <button class="btn-finish" style="margin-top:18px;width:100%" onclick="setState({showSummary:false,tab:'history'})">履歴を見る</button>
        </div>
      </div>`:""
    }

    ${s.showEditModal?`
      <div class="modal-overlay" onclick="setState({showEditModal:false})">
        <div class="modal-card" onclick="event.stopPropagation()">
          <div class="modal-header">
            <div class="modal-title" style="color:${activeGroup.color}">${activeGroup.label}の種目</div>
            <button class="modal-close" onclick="setState({showEditModal:false})">✕</button>
          </div>
          ${activeExList.map((ex,idx)=>`
            <div class="ex-item">
              ${s.editingIdx===idx?`
                <input style="flex:1;background:#0a0a0a;border:1px solid #333;color:#e8e8e8;font-family:'JetBrains Mono',monospace;font-size:13px;padding:6px 8px;outline:none" value="${s.editingVal}" oninput="state.editingVal=this.value" onkeydown="if(event.key==='Enter')confirmEditEx(${idx})" autofocus>
                <button class="btn-icon" style="color:#ff4500;font-size:18px" onclick="confirmEditEx(${idx})">✓</button>
                <button class="btn-icon" style="font-size:18px" onclick="setState({editingIdx:null})">✕</button>
              `:`
                <span class="ex-item-name">${ex}</span>
                <button class="btn-icon" onclick="startEditEx(${idx})">✎</button>
                <button class="btn-icon" onclick="deleteExFromList(${idx})">🗑</button>
              `}
            </div>`).join("")}
          <div class="add-row">
            <input placeholder="新しい種目を追加" value="${s.newExName}" oninput="state.newExName=this.value" onkeydown="if(event.key==='Enter')addExToList()">
            <button onclick="addExToList()">追加</button>
          </div>
        </div>
      </div>`:""
    }
  `;
}

// ---- Actions ----
function changeGroup(id){
  const list = state.customExercises[id]||[];
  setState({activeGroupId:id, selectedExercise:list[0]||""});
}
function openEditModal(){ setState({showEditModal:true,editingIdx:null,newExName:""}); }
function addExercise(){
  const sel = document.getElementById("exSelect");
  const name = sel ? sel.value : state.selectedExercise;
  if(!name) return;
  const id = Date.now();
  state.exercises.push({id,name,groupId:state.activeGroupId,sets:[]});
  state.inputs[id] = {weight:"",reps:""};
  render();
}
function removeExercise(id){ state.exercises=state.exercises.filter(e=>e.id!==id); render(); }
function setInput(exId,field,val){ if(!state.inputs[exId]) state.inputs[exId]={weight:"",reps:""}; state.inputs[exId][field]=val; }
function recordSet(exId){
  const inp = state.inputs[exId]||{};
  const w = parseFloat(inp.weight);
  const r = parseInt(inp.reps);
  if(isNaN(w)||isNaN(r)) return;
  const ex = state.exercises.find(e=>e.id===exId);
  if(!ex) return;
  ex.sets.push({weight:w,reps:r});
  state.inputs[exId] = {weight:inp.weight, reps:""};
  startRest(state.restTarget);
  render();
}
function removeSet(exId,idx){ const ex=state.exercises.find(e=>e.id===exId); if(ex) ex.sets=ex.sets.filter((_,i)=>i!==idx); render(); }
function startEditSet(exId,idx,w,r){ setState({editingSet:{exId,idx,weight:w,reps:r}}); }
function saveEditSet(exId,idx){
  if(!state.editingSet) return;
  const w=parseFloat(state.editingSet.weight);
  const r=parseInt(state.editingSet.reps);
  if(isNaN(w)||isNaN(r)) return;
  const ex=state.exercises.find(e=>e.id===exId);
  if(ex) ex.sets=ex.sets.map((s,i)=>i===idx?{weight:w,reps:r}:s);
  state.editingSet=null;
  render();
}
function finishSession(){
  const today=new Date();
  const totalSets=state.exercises.reduce((a,e)=>a+(e.sets?.length||0),0);
  const totalVolume=state.exercises.reduce((a,e)=>a+(e.sets||[]).reduce((b,s)=>b+s.weight*s.reps,0),0);
  const session={id:Date.now(),date:today.toLocaleDateString("ja-JP"),duration:state.elapsed,exercises:JSON.parse(JSON.stringify(state.exercises)),note:state.note,totalSets,totalVolume};
  state.history=[session,...state.history];
  sv("workout_history",state.history);
  setState({showSummary:true});
}
function deleteHistory(id){ state.history=state.history.filter(h=>h.id!==id); sv("workout_history",state.history); render(); }
function toggleHistory(id){ setState({openHistoryId:state.openHistoryId===id?null:id}); }
function resetWorkout(){ state.exercises=[]; state.note=""; state.inputs={}; stopRest(); render(); }
function addExToList(){
  const name=state.newExName.trim(); if(!name) return;
  state.customExercises[state.activeGroupId]=[...(state.customExercises[state.activeGroupId]||[]),name];
  sv("custom_exercises",state.customExercises);
  state.selectedExercise=name; state.newExName=""; render();
}
function deleteExFromList(idx){
  const list=state.customExercises[state.activeGroupId]||[];
  const removed=list[idx];
  state.customExercises[state.activeGroupId]=list.filter((_,i)=>i!==idx);
  sv("custom_exercises",state.customExercises);
  if(state.selectedExercise===removed) state.selectedExercise=state.customExercises[state.activeGroupId][0]||"";
  render();
}
function startEditEx(idx){ setState({editingIdx:idx,editingVal:state.customExercises[state.activeGroupId][idx]}); }
function confirmEditEx(idx){
  const val=state.editingVal.trim(); if(!val) return;
  const list=state.customExercises[state.activeGroupId]||[];
  const old=list[idx];
  state.customExercises[state.activeGroupId]=list.map((e,i)=>i===idx?val:e);
  sv("custom_exercises",state.customExercises);
  if(state.selectedExercise===old) state.selectedExercise=val;
  state.editingIdx=null; render();
}

// ---- Init ----
state.selectedExercise = (state.customExercises[state.activeGroupId]||[])[0]||"";
render();

// ---- PWA ----
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
